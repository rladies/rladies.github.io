name: "Check production build"

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Production build check
    runs-on: ubuntu-latest
    env:
      RENV_PROFILE: "production"
      RENV_CONFIG_SANDBOX_ENABLED: FALSE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set env parameters
        run: |
          ver=$(cat .hugoversion)
          echo "hugovr=$ver" >> $GITHUB_ENV

      - name: Install cURL Headers
        run: |
          sudo apt-get update
          sudo apt-get install libcurl4-openssl-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "renv"

      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2

      - name: Populate untranslated pages
        run: |
          Rscript scripts/missing_translations.R

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.hugovr }}
          extended: true

      - name: Build
        run: |
          hugo \
            -e production \
            -d public
