jobs:
  generate-drafts:
    name: Generate blog drafts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.push-to-protected }}

      - name: Install cURL headers
        run: |
          sudo apt-get update
          sudo apt-get install libcurl4-openssl-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R packages
        run: |
          install.packages(c("airtabler", "tidyverse", "glue", "lubridate", "httr", "readr"),
                           repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run proposal script
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: Rscript scripts/blog_proposal.R

      - name: Run events script
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: Rscript scripts/blog_events.R

      - name: Check for new files
        id: check_files
        run: |
          if [ -n "$(git status --porcelain content/blog)" ]; then
            echo "new_files=true" >> $GITHUB_OUTPUT
          else
            echo "new_files=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        if: steps.check_files.outputs.new_files == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Open PR with new drafts
        if: steps.check_files.outputs.new_files == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="blog-drafts-$(date +%Y-%m-%d-%H%M)"
          git checkout -b $BRANCH
          git add content/blog
          git commit -m "chore: add blog drafts from Airtable $(date +%Y-%m-%d)"
          git push origin $BRANCH
          gh pr create \
            --title "Blog drafts $(date +%Y-%m-%d)" \
            --body "Auto-generated blog post drafts from Airtable. Please review before merging." \
            --base main