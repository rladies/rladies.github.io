# Hugo version is managed in .hugoversion (single source of truth).
# Production builds are handled by GitHub Actions (see .github/workflows/).
# Netlify handles deploy previews and serves headers.

[build]
  publish = "/public"
  command = "export HUGO_VERSION=$(cat .hugoversion) && hugo -d public"

[context.deploy-preview]
  command = "export HUGO_VERSION=$(cat .hugoversion) && hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL -d public"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/webfonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
