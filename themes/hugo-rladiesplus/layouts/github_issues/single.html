{{ define "main" }}
<section class="site-section-lg">
  <div class="site-container">
    <div class="max-w-3xl mx-auto mb-12 entry-content">
      {{ .Content }}
    </div>

    <div id="github-issues">
      <h3 class="text-xl font-semibold mb-6">{{ i18n "gh_help_wanted" }}</h3>
      <div id="loading" class="text-center my-12">
        <div class="animate-spin inline-block w-8 h-8 border-4 border-primary border-t-transparent rounded-full" role="status">
          <span class="visually-hidden">{{ i18n "loading" }}</span>
        </div>
      </div>

      <div id="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg hidden" role="alert"></div>

      <div id="issues-container" class="hidden">
        <p class="text-muted mb-4">{{ i18n "gh_found" }} <span id="issue-count">0</span> {{ i18n "gh_open_issues" }}</p>
        <div id="issues-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>
    </div>
  </div>
</section>
{{ end }}

{{ define "footer" }}
    {{ $js := resources.Get "js/gh_helpwanted.js" | minify | fingerprint }}
    <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" crossorigin="anonymous"></script>
{{ end }}
