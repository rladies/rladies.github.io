{{ $isAuto := eq (printf "%v" .Params.translated) "auto" }}
{{ $isFallback := and (not $isAuto) (or (eq .Params.translated false) (ne .Lang .Site.Language.Lang)) }}
{{ if $isAuto }}
  <div class="alert-warning text-center mb-3 rounded-xl" role="alert">
    {{ i18n "auto_translation" | markdownify }}
  </div>
{{ else if $isFallback }}
  <div class="alert-primary text-center mb-3 rounded-xl">
    {{ i18n "missing_translation" }}
  </div>
{{ end }}
