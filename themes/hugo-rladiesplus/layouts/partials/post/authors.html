<div class="post-authors-list">
  <i class="far fa-user mr-1"></i>
  {{ range $index, $author := .author }}
    {{ if $index }}, {{ end }}
    {{ if reflect.IsMap $author }}
      {{ if $author.url }}
        <a href="{{ $author.url }}" target="_blank" rel="noopener">{{ $author.name }}</a>
      {{ else }}
        {{ $author.name }}
      {{ end }}
    {{ else }}
      {{ $author }}
    {{ end }}
  {{ end }}
</div>
