{{ define "main" }}
<section class="site-section-lg">

    <div class="max-w-lg mx-auto text-center fade-in-up">

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 301.26 277.73"
           role="img" aria-label="RLadies+"
           style="width:120px;height:auto;display:block;margin:0 auto;opacity:0.35">
        <g fill="var(--color-primary-lighter)">
          <path d="M301.26,98.29c0,49.95-37.39,91.27-85.64,97.5v-47.9c22.13-5.63,38.52-25.75,38.52-49.6,0-28.2-22.98-51.18-51.18-51.18h-74.78v15.01h-47.05V.03C109.64.05,181.81-.05,209.33.03c51.24,3.3,91.93,46.2,91.93,98.26Z"/>

      <p class="lead mt-6 mb-8">{{ i18n "404_description" . }}</p>

      <div class="flex justify-center gap-3 mb-8">
        <a href="{{ "/" | relLangURL }}" class="btn btn-primary btn-lg">
          <i class="fas fa-home mr-2"></i>{{ i18n "home" . }}
        </a>
        <a href="{{ "/events/" | relLangURL }}" class="btn btn-outline btn-lg">
          <i class="fas fa-calendar mr-2"></i>{{ i18n "events" . }}
        </a>
      </div>

      <div class="flex justify-center items-center gap-4 text-sm">
        <a href="{{ "/blog/" | relLangURL }}" class="text-primary hover:underline">{{ i18n "blog" . }}</a>
        <a href="{{ "/chapters/" | relLangURL }}" class="text-primary hover:underline">{{ i18n "chapters" . }}</a>
        <a href="{{ "/directory/" | relLangURL }}" class="text-primary hover:underline">{{ i18n "directory" . }}</a>
      </div>

    </div>
  </div>
</section>
{{ end }}
