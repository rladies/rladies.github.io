      </div>

    </div>
  </div>
</section>
<script>
(function () {
  const path = window.location.pathname;
  let lang = 'en';
  const known = ['fr', 'es', 'pt'];
  for (const k of known) {
    if (path.startsWith('/' + k + '/')) { lang = k; break; }
  }

  const s = {
    en: { desc: "Oops! This page doesn't exist!", home: 'Home',    events: 'Events',     blog: 'Blog', chapters: 'Chapters',  directory: 'Members'  },
    fr: { desc: "Oops! Cette page n'existe pas!", home: 'Accueil', events: 'Événements', blog: 'Blog', chapters: 'Chapitres', directory: 'Membres'  },
    es: { desc: '¡Ups! ¡Esta página no existe!',  home: 'Inicio',  events: 'Eventos',    blog: 'Blog', chapters: 'Capítulos', directory: 'Miembros' },
    pt: { desc: 'Ops! Esta página não existe!',   home: 'Início',  events: 'Eventos',    blog: 'Blog', chapters: 'Capítulos', directory: 'Membros'  }
  }[lang];

  document.getElementById('404-desc').textContent           = s.desc;
  document.getElementById('404-home-text').textContent      = s.home;
  document.getElementById('404-events-text').textContent    = s.events;
  document.getElementById('404-blog-text').textContent      = s.blog;
  document.getElementById('404-chapters-text').textContent  = s.chapters;
  document.getElementById('404-directory-text').textContent = s.directory;
}());
</script>
{{ end }}
