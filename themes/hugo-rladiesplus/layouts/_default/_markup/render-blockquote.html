<figure class="my-4">
  <blockquote class="border-l-4 border-gray-300 pl-4" {{ with .Attributes.cite }}cite="{{ . }}"{{ end }}>
    {{ .Text }}
  </blockquote>
  {{ with .Attributes.caption }}
    <figcaption class="text-sm text-muted mt-2">
      {{ . | safeHTML }}
    </figcaption>
  {{ end }}
</figure>
